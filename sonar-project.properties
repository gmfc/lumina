# SonarQube Cloud configuration — https://docs.sonarsource.com/sonarqube-cloud/
# Analysis runs in CI via .github/workflows/sonarqube.yml.
sonar.projectKey=gmfc_lumina
sonar.organization=gmfc

# Name displayed in the SonarQube Cloud UI.
sonar.projectName=lumina

# Analyze the Rust workspace crates. `plugins/` holds Rhai/WASM guest examples
# (no Rust source), so it is intentionally excluded.
sonar.sources=crates
sonar.sourceEncoding=UTF-8

# The coverage build populates target/; never analyze build artifacts.
sonar.exclusions=**/target/**

# Exclude I/O glue that can't be meaningfully unit-tested from the coverage ratio (still analyzed
# for bugs and code smells):
#   - main.rs: the binary entry point — terminal lifecycle + self-update process spawn. Its pure,
#     testable logic (arg parsing, --help/--version text, the update command) lives in cli.rs.
#   - run_loop.rs: the App::run terminal event loop — it blocks on event::poll/read and drives a
#     live backend. The idle-frame gate *logic* it orchestrates (frame_sig, is_animating,
#     lsp_restart_pending, drain_workers) lives in testable impl blocks and IS covered.
sonar.coverage.exclusions=**/main.rs,**/run_loop.rs

# Rust: consume the reports generated by the CI workflow rather than having the
# scanner re-run Clippy itself (deterministic, and avoids a second full compile).
sonar.rust.clippy.enabled=false
sonar.rust.clippy.reportPaths=clippy-report.json
sonar.rust.lcov.reportPaths=lcov.info
